<body class="bg-primary overflow-hidden selection:bg-white selection:text-black">
<!-- TopNavBar Component -->
<header class="fixed top-0 w-full z-50 bg-white/5 dark:bg-black/20 backdrop-blur-[40px] border-b border-neutral-900/10 dark:border-white/10 flat no-shadows h-20 px-16 flex justify-between items-center">

<a class="font-epilogue text-[10px] uppercase tracking-[0.2em] font-medium text-neutral-500 dark:text-neutral-400 hover:text-neutral-900 dark:hover:text-white transition-colors" href="#">Performance</a>

</nav>
<button class="font-epilogue text-[10px] uppercase tracking-[0.2em] font-medium text-neutral-900 dark:text-neutral-50 px-6 py-2 border border-neutral-900/20 dark:border-white/20 hover:bg-neutral-900/5 dark:hover:bg-white/5 transition-all duration-300 scale-95 active:scale-90">

<div class="absolute inset-0 flex items-center justify-center opacity-[0.02] pointer-events-none select-none"><h2 class="font-display-xl text-display-xl text-white scale-[3] font-bold opacity-[0.03]">MUSTANG</h2></div>
<div class="container-max mx-auto px-margin-edge relative z-10 flex flex-col items-center">
<!-- Headline Cluster -->
<div class="text-center mb-12">
<span class="font-label-caps text-label-caps text-on-primary-container mb-4 block">AETHER AUTOMOTIVE PRESENTS</span>
<h1 class="font-display-xl text-display-xl text-white leading-none">A LEGEND REBORN</h1>
<p class="font-body-lg text-body-lg text-secondary-fixed-dim mt-6 max-w-2xl mx-auto opacity-80">
                    The classic Ford Mustang, reimagined for the modern era. Precision engineering meets timeless silhouette.
                </p>
</div>
<!-- Car Container with Shadow -->
<div class="relative w-full max-w-6xl aspect-[21/9] flex items-center justify-center">

<div class="absolute bottom-4 left-1/2 -translate-x-1/2 w-4/5 h-12 bg-black/80 blur-3xl rounded-full"></div>
<!-- Main Visual -->
<img alt="Classic Black Ford Mustang - Studio Shot" class="relative z-20 w-full object-contain filter drop-shadow-2xl" src="screen-removebg-preview.png"/>

<span class="font-label-tech text-label-tech text-on-primary-container block uppercase opacity-50">Top Speed</span>

</div>
<div class="px-6 py-3 border border-white/10 bg-white/5 backdrop-blur-md rounded-lg">
<span class="font-label-tech text-label-tech text-on-primary-container block uppercase opacity-50">0-60 MPH</span>
<span class="font-label-caps text-[16px] text-white">3.4 SEC</span>
</div>
<div class="px-6 py-3 border border-white/10 bg-white/5 backdrop-blur-md rounded-lg">

</div>
</div>
