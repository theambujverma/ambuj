<style>
        .timer-kerning { font-variant-numeric: tabular-nums; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        
        /* Timer Animations */
        @keyframes pulse-timer {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
        
        @keyframes pulse-ring {
            0% { 
                box-shadow: 0 0 0 0 rgba(0, 255, 148, 0.7);
            }
            70% { 
                box-shadow: 0 0 0 20px rgba(0, 255, 148, 0);
            }
            100% { 
                box-shadow: 0 0 0 0 rgba(0, 255, 148, 0);
            }
        }
        
        @keyframes timer-warning {
            0%, 100% { color: #ff6b6b; }
            50% { color: #ff8787; }
        }
        
        .timer-running {
            animation: pulse-timer 1s infinite;
        }
        
        .timer-pulse {
            animation: pulse-ring 2s infinite;
        }
        
        .timer-warning-active {
            animation: timer-warning 0.5s infinite;
        }
        
        .timer-progress-circle {
            fill: none;
            stroke-width: 4;
            stroke-linecap: round;
            filter: drop-shadow(0 0 8px #00FF94);
        }
        
        .timer-progress-ring {
            transform: rotate(-90deg);
            transform-origin: 50% 50%;
        }
    </style>

<script>
    // ============ MODE MANAGEMENT ============
    let currentMode = 'stopwatch'; // 'stopwatch' or 'timer'
    
    function switchMode(mode) {
        if (isRunning) stopTimer();
        
        currentMode = mode;
        const stopwatchBtn = document.getElementById('stopwatchBtn');
        const timerBtn = document.getElementById('timerBtn');
        const timerInputSection = document.getElementById('timerInputSection');
        const timerCircleContainer = document.getElementById('timerCircleContainer');
        const lapBtn = document.querySelector('[data-icon="timer"]').closest('button');
        const modeLabel = document.getElementById('modeLabel');
        const lapHistoryPanel = document.querySelector('aside');
        const dashboardAnalytics = document.querySelector('.grid.grid-cols-1');
        
        if (mode === 'stopwatch') {
            stopwatchBtn.classList.add('text-[#00FF94]', 'border-b-2', 'border-[#00FF94]');
            stopwatchBtn.classList.remove('text-white/60', 'hover:text-white');
            timerBtn.classList.remove('text-[#00FF94]', 'border-b-2', 'border-[#00FF94]');
            timerBtn.classList.add('text-white/60', 'hover:text-white');
            timerInputSection.classList.add('hidden');
            timerCircleContainer.classList.add('hidden');
            lapBtn.style.display = 'flex';
            lapHistoryPanel.style.display = 'flex';
            modeLabel.textContent = 'Precision Performance';
            dashboardAnalytics.style.display = 'grid';
            
            // Reset timer laps if switching back
            totalTime = 0;
            laps = [];
            updateDisplay();
            renderLapHistory();
        } else {
            timerBtn.classList.add('text-[#00FF94]', 'border-b-2', 'border-[#00FF94]');
            timerBtn.classList.remove('text-white/60', 'hover:text-white');
            stopwatchBtn.classList.remove('text-[#00FF94]', 'border-b-2', 'border-[#00FF94]');
            stopwatchBtn.classList.add('text-white/60', 'hover:text-white');
            timerInputSection.classList.remove('hidden');
            timerCircleContainer.classList.remove('hidden');
            lapBtn.style.display = 'flex';  // Show lap button in timer mode too!
            lapHistoryPanel.style.display = 'flex';  // Show lap history in timer mode!
            modeLabel.textContent = 'Countdown Timer';
            dashboardAnalytics.style.display = 'none';
            
            // Reset stopwatch
            totalTime = 0;
            laps = [];
            updateDisplay();
            renderLapHistory();
            updateTimerCircle();
        }
    }

    // ============ TIMER STATE ============
    let timerDuration = 60000; // 1 minute in milliseconds
    let timerRemaining = 60000;
    let timerFinished = false;

    function setTimerDuration() {
        if (isRunning) return;
        
        const hours = parseInt(document.getElementById('timerHours').value) || 0;
        const minutes = parseInt(document.getElementById('timerMinutes').value) || 0;
        const seconds = parseInt(document.getElementById('timerSeconds').value) || 0;
        
        timerDuration = (hours * 3600 + minutes * 60 + seconds) * 1000;
        
        if (timerDuration <= 0) {
            alert('Please set a valid time');
            return;
        }
        
        timerRemaining = timerDuration;
        timerFinished = false;
        
        // Reset laps for new timer session
        laps = [];
        lapStartTime = 0;
        
        updateDisplay();
        renderLapHistory();
        updateStatistics();
    }

    // ============ STOPWATCH STATE ============
    let isRunning = false;
    let totalTime = 0; // in milliseconds
    let lapStartTime = 0;
    let laps = [];
    let intervalId = null;

    // ============ DOM ELEMENTS ============
    const timerDisplay = document.querySelector('.font-timer-display');
    const millisDisplay = timerDisplay.querySelector('.font-timer-ms');
    const startBtn = document.querySelector('[data-icon="play_arrow"]').closest('button');
    const resetBtn = document.querySelector('[data-icon="refresh"]').closest('button');
    const lapBtn = document.querySelector('[data-icon="timer"]').closest('button');
    const lapHistoryContainer = document.querySelector('.flex-grow.overflow-y-auto');
    const fastestLapDisplay = document.querySelector('.font-lap-time.text-primary-container');
    const averageLapDisplay = document.querySelectorAll('.font-lap-time')[1];
    const totalLapsDisplay = document.querySelectorAll('.font-lap-time')[2];
    const currentSessionTime = document.querySelector('.font-headline-lg.text-white');
    const progressBar = document.querySelector('.absolute.inset-y-0.left-0.bg-primary-container');
    const deleteHistoryBtn = document.querySelector('[data-icon="delete_sweep"]').closest('button');

    // ============ FORMAT TIME ============
    function formatTime(ms) {
        const totalSeconds = Math.floor(ms / 1000);
        const hours = Math.floor(totalSeconds / 3600);
        const minutes = Math.floor((totalSeconds % 3600) / 60);
        const seconds = totalSeconds % 60;
        const milliseconds = Math.floor((ms % 1000) / 10);

        const hr = String(hours).padStart(2, '0');
        const min = String(minutes).padStart(2, '0');
        const sec = String(seconds).padStart(2, '0');
        const ms_display = String(milliseconds).padStart(2, '0');

        return { time: `${hr}:${min}:${sec}`, ms: ms_display };
    }

    // ============ UPDATE DISPLAY ============
    function updateDisplay() {
        let displayTime = currentMode === 'stopwatch' ? totalTime : timerRemaining;
        const formatted = formatTime(displayTime);
        const timeSpans = timerDisplay.querySelectorAll('span');
        
        // Update hours, minutes, seconds
        timeSpans[0].textContent = formatted.time.split(':')[0];
        timeSpans[1].textContent = formatted.time.split(':')[1];
        timeSpans[2].textContent = formatted.time.split(':')[2];
        
        // Update milliseconds
        millisDisplay.textContent = '.' + formatted.ms;
        
        // Update current session time
        if (currentSessionTime) {
            currentSessionTime.textContent = formatted.time;
        }
        
        // Timer mode: Update circle progress
        if (currentMode === 'timer') {
            updateTimerCircle();
            
            // Timer color warning
            const timerDisplay = document.querySelector('.font-timer-display');
            if (timerRemaining <= 10000) {
                timerDisplay.classList.add('text-red-400');
                timerDisplay.classList.add('timer-warning-active');
            } else {
                timerDisplay.classList.remove('text-red-400');
                timerDisplay.classList.remove('timer-warning-active');
            }
        }
    }

    // ============ UPDATE TIMER CIRCLE ============
    function updateTimerCircle() {
        const circle = document.getElementById('timerProgressCircle');
        const timerCircleDisplay = document.getElementById('timerCircleDisplay');
        
        if (!circle || !timerCircleDisplay) return;
        
        // SVG circle radius (must match SVG r="85")
        const radius = 85;
        const circumference = 2 * Math.PI * radius; // ~534.07
        
        // Calculate progress (0 to 1, where 1 = full duration remaining)
        const progress = Math.max(0, timerRemaining / timerDuration);
        
        // Calculate offset: starts at 0 (full circle filled) and goes to circumference (empty)
        const offset = circumference - (progress * circumference);
        
        // Update SVG attributes
        circle.setAttribute('stroke-dasharray', circumference.toFixed(2));
        circle.setAttribute('stroke-dashoffset', offset.toFixed(2));
        
        // Update circle display text (MM:SS format)
        const totalSeconds = Math.floor(timerRemaining / 1000);
        const minutes = Math.floor(totalSeconds / 60);
        const seconds = totalSeconds % 60;
        const min = String(minutes).padStart(2, '0');
        const sec = String(seconds).padStart(2, '0');
        
        timerCircleDisplay.textContent = `${min}:${sec}`;
        
        // Dynamic color based on time remaining
        if (timerRemaining <= 10000) {
            // Red warning (≤10s)
            circle.setAttribute('stroke', '#ff6b6b');
            circle.style.filter = 'drop-shadow(0 0 12px #ff6b6b)';
        } else if (timerRemaining <= timerDuration / 4) {
            // Orange warning (≤1/4 remaining)
            circle.setAttribute('stroke', '#ffa500');
            circle.style.filter = 'drop-shadow(0 0 10px #ffa500)';
        } else {
            // Green normal
            circle.setAttribute('stroke', '#00FF94');
            circle.style.filter = 'drop-shadow(0 0 8px #00FF94)';
        }
    }

    // ============ START/STOP TIMER ============
    function toggleTimer() {
        if (currentMode === 'timer' && timerRemaining <= 0) {
            alert('Please set a timer duration first');
            return;
        }
        
        if (isRunning) {
            stopTimer();
        } else {
            startTimer();
        }
    }

    function startTimer() {
        if (isRunning) return;
        
        isRunning = true;
        
        // Update button text
        const btnText = startBtn.querySelector('.font-headline-lg');
        if (btnText) btnText.textContent = 'PAUSE';
        
        // Add animation effects
        const timerDisplay = document.querySelector('.font-timer-display');
        const timerCircleContainer = document.getElementById('timerCircleContainer');
        timerDisplay.classList.add('timer-running');
        if (timerCircleContainer && currentMode === 'timer') {
            timerCircleContainer.classList.add('timer-pulse');
        }
        
        if (currentMode === 'stopwatch') {
            const startTime = Date.now() - totalTime;
            
            intervalId = setInterval(() => {
                totalTime = Date.now() - startTime;
                updateDisplay();
            }, 10);
        } else {
            // Timer countdown mode
            const startTime = Date.now();
            const initialRemaining = timerRemaining;
            
            intervalId = setInterval(() => {
                const elapsed = Date.now() - startTime;
                timerRemaining = initialRemaining - elapsed;
                
                if (timerRemaining <= 0) {
                    timerRemaining = 0;
                    stopTimer();
                    timerFinished = true;
                    playTimerAlert();
                }
                
                updateDisplay();
            }, 10);
        }
    }

    function stopTimer() {
        if (!isRunning) return;
        
        isRunning = false;
        clearInterval(intervalId);
        
        // Remove animation effects
        const timerDisplay = document.querySelector('.font-timer-display');
        const timerCircleContainer = document.getElementById('timerCircleContainer');
        timerDisplay.classList.remove('timer-running');
        if (timerCircleContainer) {
            timerCircleContainer.classList.remove('timer-pulse');
        }
        
        // Update button text
        const btnText = startBtn.querySelector('.font-headline-lg');
        if (btnText) btnText.textContent = 'START';
    }

    function playTimerAlert() {
        // Simple beep using Web Audio API
        try {
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            
            oscillator.frequency.value = 800;
            oscillator.type = 'sine';
            
            gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.5);
            
            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + 0.5);
        } catch (e) {
            console.log('Audio alert not available');
        }
    }

    // ============ RESET TIMER ============
    function resetTimer() {
        stopTimer();
        
        if (currentMode === 'stopwatch') {
            totalTime = 0;
            laps = [];
            lapStartTime = 0;
            updateDisplay();
            renderLapHistory();
            updateStatistics();
        } else {
            // Timer mode - reset to set duration
            timerRemaining = timerDuration;
            laps = [];
            lapStartTime = 0;
            timerFinished = false;
            updateDisplay();
            renderLapHistory();
            updateStatistics();
            updateTimerCircle();
        }
    }

    // ============ RECORD LAP ============
    function recordLap() {
        if (currentMode === 'stopwatch') {
            if (totalTime === 0) return;
            
            const lapTime = totalTime - lapStartTime;
            laps.push({
                lapNumber: laps.length + 1,
                lapTime: lapTime,
                totalTime: totalTime
            });
            
            lapStartTime = totalTime;
            renderLapHistory();
            updateStatistics();
        } else if (currentMode === 'timer') {
            // In timer mode, track elapsed time
            const elapsedTime = timerDuration - timerRemaining;
            
            if (elapsedTime === 0) return;
            
            const lapTime = elapsedTime - lapStartTime;
            laps.push({
                lapNumber: laps.length + 1,
                lapTime: lapTime,
                totalTime: elapsedTime,
                mode: 'timer'
            });
            
            lapStartTime = elapsedTime;
            renderLapHistory();
            updateStatistics();
        }
    }

    // ============ RENDER LAP HISTORY ============
    function renderLapHistory() {
        if (laps.length === 0) {
            lapHistoryContainer.innerHTML = `
                <div class="p-6 text-center py-20 flex flex-col items-center opacity-30">
                    <span class="material-symbols-outlined text-6xl mb-4" data-icon="history">history</span>
                    <p class="font-body-md text-on-surface-variant">No sessions recorded yet.</p>
                </div>
            `;
            return;
        }

        let html = '';
        
        // Reverse order to show newest first
        for (let i = laps.length - 1; i >= 0; i--) {
            const lap = laps[i];
            const lapFormatted = formatTime(lap.lapTime);
            const totalFormatted = formatTime(lap.totalTime);
            
            html += `
                <div class="flex items-center justify-between px-6 py-4 border-b border-[#1C1C1E] hover:bg-white/5 transition-colors group">
                    <div class="flex items-center gap-4">
                        <span class="font-label-caps text-white/30">${String(lap.lapNumber).padStart(2, '0')}</span>
                        <div>
                            <p class="font-lap-time text-lap-time text-white">${lapFormatted.time}.${lapFormatted.ms}</p>
                            <p class="font-label-caps text-[10px] text-white/40 uppercase">Lap Split</p>
                        </div>
                    </div>
                    <div class="text-right">
                        <p class="font-body-md text-primary-container">${totalFormatted.time}.${totalFormatted.ms}</p>
                        <p class="font-label-caps text-[10px] text-white/40 uppercase">Total Time</p>
                    </div>
                    <button class="ml-4 material-symbols-outlined text-white/20 hover:text-red-400 opacity-0 group-hover:opacity-100 transition-opacity" onclick="deleteLap(${i})">delete</button>
                </div>
            `;
        }
        
        lapHistoryContainer.innerHTML = html;
    }

    // ============ DELETE LAP ============
    function deleteLap(index) {
        laps.splice(index, 1);
        
        // Recalculate lap numbers
        laps.forEach((lap, idx) => {
            lap.lapNumber = idx + 1;
        });
        
        renderLapHistory();
        updateStatistics();
    }

    // ============ UPDATE STATISTICS ============
    function updateStatistics() {
        if (laps.length === 0) {
            fastestLapDisplay.textContent = '00:00.00';
            averageLapDisplay.textContent = '00:00.00';
            totalLapsDisplay.textContent = '0';
            return;
        }

        // Calculate fastest lap
        const fastestLap = Math.min(...laps.map(l => l.lapTime));
        const fastestFormatted = formatTime(fastestLap);
        fastestLapDisplay.textContent = `${fastestFormatted.time.slice(3)}.${fastestFormatted.ms}`;

        // Calculate average lap
        const totalLapTime = laps.reduce((sum, lap) => sum + lap.lapTime, 0);
        const averageLap = totalLapTime / laps.length;
        const averageFormatted = formatTime(averageLap);
        averageLapDisplay.textContent = `${averageFormatted.time.slice(3)}.${averageFormatted.ms}`;

        // Total laps
        totalLapsDisplay.textContent = laps.length;

        // Update progress bar
        if (progressBar) {
            const percentage = Math.min((laps.length / 20) * 100, 100);
            progressBar.style.width = percentage + '%';
        }
    }

    // ============ CLEAR HISTORY ============
    function clearHistory() {
        if (confirm('Are you sure you want to clear all lap history?')) {
            laps = [];
            renderLapHistory();
            updateStatistics();
        }
    }

    // ============ EVENT LISTENERS ============
    startBtn.addEventListener('click', toggleTimer);
    resetBtn.addEventListener('click', resetTimer);
    lapBtn.addEventListener('click', recordLap);
    deleteHistoryBtn.addEventListener('click', clearHistory);

    // ============ KEYBOARD SHORTCUTS ============
    document.addEventListener('keydown', (e) => {
        if (e.code === 'Space') {
            e.preventDefault();
            toggleTimer();
        } else if (e.code === 'KeyL') {
            recordLap();  // Works in both stopwatch and timer modes
        } else if (e.code === 'KeyR') {
            resetTimer();
        }
    });

    // Initialize display
    updateDisplay();
    updateTimerCircle();
    
    // Initialize circle on timer mode switch
    const stopwatchBtn = document.getElementById('stopwatchBtn');
    const timerBtn = document.getElementById('timerBtn');
    
    if (stopwatchBtn && timerBtn) {
        stopwatchBtn.addEventListener('click', () => {
            setTimeout(updateDisplay, 50);
        });
        
        timerBtn.addEventListener('click', () => {
            setTimeout(() => {
                updateDisplay();
                updateTimerCircle();
            }, 50);
        });
    }
</script>

</body></html>
